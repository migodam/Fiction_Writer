          - generic [ref=e1381]: "# Starter Demo Project # Fractured Arrival The investigation begins and the first hidden route surfaces. ## Dockside Arrival Aria stepped off the lift into the Sky Dock haze, where the city smelled like cold copper and stormwater. Rowan waited beside a stack of confiscated trunks, already bored by her questions and curious in spite of himself. ## Flood Market Line Below the market awnings, Nila unrolled her layered city map across a tea crate. Rowan pointed to a corridor no patrol report admitted existed, and the ink shimmered as though the city itself disliked being found. # Pressure Lines Political pressure, archive reconstruction, and the bridge setup collide. ## Choir in Lantern Ward Seren did not greet Aria with suspicion but with receipts, witness statements, and names of families priced out of their own memories. The room listened for Aria's answer before anyone reached for wine. ## Archive Reconstruction The breach looked surgical until Nila overlaid the transit lines. Then the theft became choreography: a convoy stepping between map revisions, using the city's own forgotten seams as cover. ## Consul's Smile Vesper spoke like a man tidying an inconvenience rather than defending a crime scene. Every answer he offered was elegant, plausible, and positioned exactly one step away from the truth. ## Glass Bridge Intercept By the time the convoy reached the Glass Bridge, every alliance had already become conditional. Aria tracked the shard, Seren controlled the crowd, Nila corrected the map in real time, and Vesper smiled like he had authored the weather. # Appendices ## Characters - Aria Solis: Lead investigator chasing the memory archive theft. - Rowan Vale: A disgraced tactician who knows the undercity routes. - Seren Thorne: Leader of the Glass Choir opposition cell. - Vesper Hale: A polished antagonist directing the theft network. - Nila Quill: Cartographer and world-map specialist for the Bureau. ## Timeline - Arrival at Sky Dock (Day 1 - Dawn) - Market Route Leak (Day 1 - Midday) - Choir Salon Meeting (Day 1 - Night) - Archive Breach Review (Day 2 - Morning) - Bridge Intercept (Day 2 - Sunset) - Emergency Public Hearing (Day 3 - Morning)"
